allowBuilds:
  esbuild: true
  tldjs: false

minimumReleaseAgeExclude:
  - functype-log@1.5.0
  - functype@1.5.0

# pnpm 11 ignores `public-hoist-pattern` in .npmrc; the canonical home is here.
# Hoists CLI tool binaries from transitive deps so ts-builds can find them.
publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"
  - "*rimraf*"
  - "*cross-env*"
