name: Publish to NPM and MCP Registry

on:
  push:
    tags:
      - "v*" # Triggers on version tags like v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub release
      id-token: write # Required for npm provenance and MCP registry OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Check version consistency across package.json / server.json
        run: pnpm check:versions

      - name: Run validation pipeline
        run: pnpm run validate

      - name: Update npm
        run: npm install -g npm@latest

      - name: Verify package contents
        run: |
          echo "Files to be published:"
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MCP Publisher
        # v1.7.6+ required: registry binds the GitHub OIDC token exchange to a
        # per-deployment audience (https://registry.modelcontextprotocol.io)
        # rather than the legacy "mcp-registry" string. Older publisher
        # versions request the legacy audience and the server rejects them
        # with HTTP 401 ("invalid audience").
        # Release: https://github.com/modelcontextprotocol/registry/releases/tag/v1.7.6
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x ./mcp-publisher

      - name: Login to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
